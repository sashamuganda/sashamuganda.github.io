<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sasha Muganda | Designer</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #333333;
            --text-light: #777777;
            --accent-blue: #2352b5;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden; 
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            line-height: 1.6;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            padding: 40px 30px 40px 40px;
            gap: 50px;
        }

        /* ------------------ LEFT SIDEBAR ------------------ */
        .sidebar {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-main);
            margin-bottom: 36px;
        }
        .brand img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #ddd;
        }
        .brand h1 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.4px;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 32px;
        }
        nav a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 1rem;
            transition: color 0.3s ease;
        }
        nav a:hover, nav a.active {
            color: var(--text-main);
            font-weight: 500;
        }

        .intro-text {
            color: var(--text-main);
            font-size: 0.95rem;
            flex: 1;
        }

        .closing-text {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .social-links {
            display: flex;
            gap: 14px;
        }
        .social-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: opacity 0.3s;
        }
        .social-links a:hover {
            opacity: 0.5;
        }

        /* ------------------ RIGHT: 4-PANEL GRID ------------------ */
        .grid-panel {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            height: 100%;
        }

        .panel {
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
        }

        /* UPDATED: Image filtering to darken and slightly desaturate the vectors */
        .panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, filter 0.5s ease;
            filter: brightness(0.5) saturate(0.8); 
        }

        /* UPDATED: Brighten slightly and scale up on hover */
        .panel:hover img {
            transform: scale(1.04);
            filter: brightness(0.7) saturate(1); 
        }

        /* UPDATED: Gradient overlay now covers the entire image with a dark wash */
        .panel-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px 22px;
            transition: background 0.4s ease;
        }

        /* UPDATED: Overlay darkens further on hover to push text to the front */
        .panel:hover .panel-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 100%);
        }

        .panel-category {
            color: #487FB6;
            font-size: 0.68rem;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px); 
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .panel-title {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: -0.3px;
            margin-bottom: 14px;
        }

        .btn-explore {
            display: inline-block;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.8);
            color: #fff;
            text-decoration: none;
            font-size: 0.78rem;
            letter-spacing: 0.5px;
            width: fit-content;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.35s ease, transform 0.35s ease, background 0.3s ease;
            pointer-events: none;
        }

        .panel:hover .btn-explore {
            opacity: 1;
            transform: translateY(0);
        }

        .panel:nth-child(1) { background-color: #d4dce8; }
        .panel:nth-child(2) { background-color: #d8e0d4; }
        .panel:nth-child(3) { background-color: #e0d8d4; }
        .panel:nth-child(4) { background-color: #dcd4e0; }

        /* ------------------ MODAL GALLERY STYLES ------------------ */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 32px;
            color: var(--text-light);
            cursor: pointer;
            z-index: 10;
            line-height: 1;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        #modal-body {
            padding: 40px;
            overflow-y: auto;
        }

        .modal-title-text {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--text-main);
            letter-spacing: -0.5px;
